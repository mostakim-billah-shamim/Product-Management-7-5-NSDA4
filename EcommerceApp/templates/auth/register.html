{% extends 'base/base.html' %}


{% block title %}
    Register
{% endblock title %}


{% block body %}

    <div class="container mt-5 row justify-content-center">
        <div class="col-md-6 shadow-lg rounded-4 bg-white p-4">
            <h1 class="text-center text-info">Register Now</h1>
            {% load crispy_forms_tags %}
            <form action="" method="post">
                {% csrf_token %}
                {{form|crispy}}

                <button class="btn btn-success" type="submit">Register</button>
            </form>

        </div>

    </div>


{% endblock body %}
