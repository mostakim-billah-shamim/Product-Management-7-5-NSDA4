{% extends 'base/base.html' %}


{% block title %}
    Update Category
{% endblock title %}


{% block body %}
    <div class="mt-5 row justify-content-center">
        <h1 class="text-center text-info">Update Category</h1>
        {% load crispy_forms_tags %}
        <div class="col-md-6 shadow-lg rounded-4 bg-white p-4">
            <form action="" method="post">
                {% csrf_token %}
                {{form|crispy}}

                <button class="btn btn-success" type="submit">Update</button>
            </form>

        </div>

    </div>



{% endblock body %}
